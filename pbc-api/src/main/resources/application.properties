app.version=2026.1.0-SNAPSHOT
ios.support.version=2025.1.0
android.support.version=2025.1.0

# Email properties
## Common SMTP Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

## Email broadcaster count
mail.broadcaster.count=5

## Email Broadcaster One
mail.broadcast.one.username=${PBC_MAIL_BROADCASTER_ONE_USERNAME}
mail.broadcast.one.password=${PBC_MAIL_BROADCASTER_ONE_PASSWORD}

## Email Broadcaster Two
mail.broadcast.two.username=${PBC_MAIL_BROADCASTER_TWO_USERNAME}
mail.broadcast.two.password=${PBC_MAIL_BROADCASTER_TWO_PASSWORD}

## Email Broadcaster Three
mail.broadcast.three.username=${PBC_MAIL_BROADCASTER_THREE_USERNAME}
mail.broadcast.three.password=${PBC_MAIL_BROADCASTER_THREE_PASSWORD}

## Email Broadcaster Four
mail.broadcast.four.username=${PBC_MAIL_BROADCASTER_FOUR_USERNAME}
mail.broadcast.four.password=${PBC_MAIL_BROADCASTER_FOUR_PASSWORD}

## Email Broadcaster Five
mail.broadcast.five.username=${PBC_MAIL_BROADCASTER_FIVE_USERNAME}
mail.broadcast.five.password=${PBC_MAIL_BROADCASTER_FIVE_PASSWORD}

## File Storage Properties
file.file-dir=./build/tmp/export-files