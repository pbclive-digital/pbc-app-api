<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template</title>
    <style>
        /* Basic Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
        }
        table {
            border-spacing: 0;
        }
        td {
            padding: 0;
        }
        img {
            border: 0;
        }

        /* Container */
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f4f4f4;
            padding-bottom: 40px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            color: #333333;
        }

        /* Content Styles */
        .header {
            padding: 30px 0;
            text-align: center;
        }

        .content {
            padding: 0 10px 30px 30px;
            text-align: left;
            line-height: 1.6;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Button */
        .button-container {
            text-align: center;
            padding: 20px 0 40px 0;
        }

        .button {
            background-color: #007bff;
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #888888;
        }
    </style>
</head>
<body>
<div class="wrapper" style="text-align: center;">
    <table class="main" width="100%">
        <tr>
            <td class="header">
                <img src="cid:logo" alt="PBC Logo" width="100" style="display: block; margin: 0 auto;">
            </td>
        </tr>

        <tr>
            <td class="content">
                <div class="title" th:text="${title}">Email Title Goes Here</div>

                <p th:text="${message}">
                    This is where your primary email content will live. You can pass any string from your Spring Boot controller to populate this area.
                </p>
            </td>
        </tr>

        <tr>
            <td class="button-container">
                <a th:href="${actionUrl}" class="button">Click Here</a>
            </td>
        </tr>

        <tr>
            <td class="footer">
                <p>Thank you for being with us!</p>
                <p>&copy; 2026 Pittsburgh Buddhist Center</p>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
